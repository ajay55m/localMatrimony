# Project-wide Gradle settings.

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.

# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Specifies the JVM arguments used for the daemon process.
# Increased memory to 4096m for faster compilation
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m

# Enable parallel mode and build caching for faster incremental builds
org.gradle.parallel=true
org.gradle.caching=true

# Keep AndroidX enabled
android.useAndroidX=true

# Build ONLY for common modern architectures (faster development)
# For release, you can put back the full list: armeabi-v7a,arm64-v8a,x86,x86_64
reactNativeArchitectures=arm64-v8a,x86_64

# TEMPORARILY DISABLED New Architecture for faster dev cycles.
# It requires slow C++ compilation. Set to true only if testing Fabric/TurboModules.
newArchEnabled=false

# Keep Hermes enabled (faster startup & debugging)
hermesEnabled=true

# Edge-to-edge support
edgeToEdgeEnabled=false
